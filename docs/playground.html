<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fleet Vector API Playground</title>
<meta name="description" content="SuperInstance — Build intelligent agent fleets. Documentation, API reference, and SDKs.">
<link rel="icon" type="image/svg+xml" href="https://superinstance-assets.casey-digennaro.workers.dev/favicon.svg">
<style>
  :root {
    --bg: #0a0a0f;
    --bg-raised: #12121a;
    --bg-input: #16161f;
    --border: #2a2a3a;
    --text: #e0e0e8;
    --text-dim: #888898;
    --accent: #00E6D6;
    --accent-dim: rgba(0,230,214,0.15);
    --accent-hover: #00ffef;
    --error: #ff5566;
    --success: #00e68a;
    --warn: #ffaa33;
    --radius: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* Sidebar */
  .sidebar {
    width: 260px;
    min-width: 260px;
    background: var(--bg-raised);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
  }

  .sidebar-header {
    padding: 20px 16px 12px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-header h1 {
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.3px;
    margin-bottom: 12px;
  }

  .sidebar-header h1 span { color: var(--text-dim); font-weight: 400; }

  .search-box {
    width: 100%;
    padding: 8px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box:focus { border-color: var(--accent); }

  .endpoint-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .endpoint-list::-webkit-scrollbar { width: 4px; }
  .endpoint-list::-webkit-scrollbar-track { background: transparent; }
  .endpoint-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .endpoint-item {
    padding: 10px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 2px;
  }

  .endpoint-item:hover { background: var(--accent-dim); }
  .endpoint-item.active { background: var(--accent-dim); border-left: 3px solid var(--accent); }

  .endpoint-item .method {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 2px;
  }

  .method-post { color: var(--success); }
  .method-get { color: var(--accent); }

  .endpoint-item .path {
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 13px;
    color: var(--text);
  }

  .endpoint-item .desc {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  /* Main */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .main-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .method-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 4px;
    text-transform: uppercase;
  }

  .method-badge.post { background: rgba(0,230,138,0.15); color: var(--success); }
  .method-badge.get { background: var(--accent-dim); color: var(--accent); }

  .main-header .url {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: var(--text);
    flex: 1;
  }

  .main-header .url span { color: var(--text-dim); }

  .main-body {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  .panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel + .panel { border-left: 1px solid var(--border); }

  .panel-header {
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg-raised);
  }

  .panel-header h3 {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-dim);
  }

  .editor-wrap {
    flex: 1;
    overflow: auto;
    position: relative;
  }

  .editor-wrap::-webkit-scrollbar { width: 6px; }
  .editor-wrap::-webkit-scrollbar-track { background: transparent; }
  .editor-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  textarea.editor {
    width: 100%;
    height: 100%;
    padding: 16px 20px;
    background: var(--bg);
    border: none;
    color: var(--text);
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 13px;
    line-height: 1.6;
    resize: none;
    outline: none;
    tab-size: 2;
  }

  /* Response */
  .response-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
  }

  .status-badge {
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 600;
  }

  .status-badge.ok { background: rgba(0,230,138,0.15); color: var(--success); }
  .status-badge.err { background: rgba(255,85,102,0.15); color: var(--error); }

  .response-time { color: var(--text-dim); }

  .response-body {
    flex: 1;
    overflow: auto;
    padding: 16px 20px;
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 13px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .response-body::-webkit-scrollbar { width: 6px; }
  .response-body::-webkit-scrollbar-track { background: transparent; }
  .response-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Syntax highlighting */
  .json-key { color: #7ec8e3; }
  .json-string { color: #98c379; }
  .json-number { color: #d19a66; }
  .json-bool { color: #c678dd; }
  .json-null { color: var(--text-dim); }

  .placeholder {
    color: var(--text-dim);
    font-style: italic;
    text-align: center;
    padding: 60px 20px;
  }

  /* Send button */
  .send-btn {
    padding: 8px 24px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: var(--radius);
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }

  .send-btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
  .send-btn:active { transform: translateY(0); }
  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Description */
  .endpoint-desc {
    padding: 12px 24px;
    background: var(--bg-raised);
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.5;
  }

  .endpoint-desc code {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 12px;
    color: var(--accent);
  }

  /* Resizer */
  .resizer {
    width: 1px;
    background: var(--border);
    cursor: col-resize;
    transition: background 0.2s;
  }

  .resizer:hover, .resizer.dragging { background: var(--accent); width: 2px; }

  /* Footer */
  .sidebar-footer {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-dim);
  }

  .sidebar-footer a { color: var(--accent); text-decoration: none; }

  @media (max-width: 768px) {
    .sidebar { width: 200px; min-width: 200px; }
  }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <h1>Fleet Vector <span>API</span></h1>
    <input type="text" class="search-box" placeholder="Search endpoints…" id="searchBox">
  </div>
  <div class="endpoint-list" id="endpointList"></div>
  <div class="sidebar-footer">
    Base URL: <a href="https://fleet-vector-api.casey-digennaro.workers.dev" target="_blank">fleet-vector-api</a>
  </div>
</div>

<div class="main">
  <div class="main-header">
    <span class="method-badge" id="methodBadge">POST</span>
    <div class="url" id="urlDisplay"><span>https://fleet-vector-api.casey-digennaro.workers.dev</span>/search</div>
    <button class="send-btn" id="sendBtn" onclick="sendRequest()">▶ Send</button>
  </div>
  <div class="endpoint-desc" id="endpointDesc">Semantic search across indexed crates. Returns top-K results ranked by relevance.</div>
  <div class="main-body">
    <div class="panel">
      <div class="panel-header">
        <h3>Request Body</h3>
        <button style="background:none;border:1px solid var(--border);color:var(--text-dim);padding:3px 10px;border-radius:4px;font-size:11px;cursor:pointer;" onclick="formatJson()" title="Format JSON">✎ Format</button>
      </div>
      <div class="editor-wrap">
        <textarea class="editor" id="requestEditor" spellcheck="false"></textarea>
      </div>
    </div>
    <div class="resizer" id="resizer"></div>
    <div class="panel">
      <div class="panel-header">
        <h3>Response</h3>
        <div class="response-meta" id="responseMeta"></div>
      </div>
      <div class="response-body" id="responseBody">
        <div class="placeholder">Hit Send to see the response here</div>
      </div>
    </div>
  </div>
</div>

<script>
const BASE = 'https://fleet-vector-api.casey-digennaro.workers.dev';

const endpoints = [
  {
    method: 'POST', path: '/search', name: 'Search',
    desc: 'Semantic search across indexed crates. Returns top-K results ranked by cosine similarity.',
    body: { query: "logging library for Rust", topK: 5 }
  },
  {
    method: 'POST', path: '/recommend', name: 'Recommend',
    desc: 'Get crate recommendations based on a seed crate or description. Uses embedding similarity.',
    body: { crate: "tokio", reason: "async runtime alternatives", topK: 5 }
  },
  {
    method: 'POST', path: '/similar', name: 'Similar',
    desc: 'Find crates similar to a given crate by vector proximity. Ideal for "users also liked" features.',
    body: { crate: "serde", topK: 8 }
  },
  {
    method: 'GET', path: '/stats', name: 'Stats',
    desc: 'Index statistics: total vectors, dimensions, embedding model, and last updated timestamp.',
    body: null
  },
  {
    method: 'POST', path: '/clusters', name: 'Clusters',
    desc: 'Discover thematic clusters in the crate index. Returns labeled groups with member crates.',
    body: { numClusters: 6, minSize: 3 }
  },
  {
    method: 'GET', path: '/dashboard', name: 'Dashboard',
    desc: 'Aggregated dashboard data: category distribution, popular crates, and index health.',
    body: null
  },
  {
    method: 'POST', path: '/gap-analysis', name: 'Gap Analysis',
    desc: 'Analyze gaps in the ecosystem. Identify underserved categories or missing crate types.',
    body: { domain: "web framework", compareWith: "JavaScript npm ecosystem" }
  }
];

let activeIdx = 0;

function renderEndpoints(filter = '') {
  const list = document.getElementById('endpointList');
  list.innerHTML = '';
  const lower = filter.toLowerCase();
  endpoints.forEach((ep, i) => {
    if (lower && !ep.name.toLowerCase().includes(lower) && !ep.path.toLowerCase().includes(lower)) return;
    const el = document.createElement('div');
    el.className = 'endpoint-item' + (i === activeIdx ? ' active' : '');
    el.innerHTML = `
      <div class="method method-${ep.method.toLowerCase()}">${ep.method}</div>
      <div class="path">${ep.path}</div>
      <div class="desc">${ep.name}</div>
    `;
    el.onclick = () => selectEndpoint(i);
    list.appendChild(el);
  });
}

function selectEndpoint(i) {
  activeIdx = i;
  const ep = endpoints[i];

  document.getElementById('methodBadge').textContent = ep.method;
  document.getElementById('methodBadge').className = 'method-badge ' + ep.method.toLowerCase();
  document.getElementById('urlDisplay').innerHTML = `<span>${BASE}</span>${ep.path}`;
  document.getElementById('endpointDesc').innerHTML = ep.desc;

  const editor = document.getElementById('requestEditor');
  if (ep.body) {
    editor.value = JSON.stringify(ep.body, null, 2);
    editor.disabled = false;
  } else {
    editor.value = '// No request body required';
    editor.disabled = true;
  }

  document.getElementById('responseMeta').innerHTML = '';
  document.getElementById('responseBody').innerHTML = '<div class="placeholder">Hit Send to see the response here</div>';

  renderEndpoints(document.getElementById('searchBox').value);
}

function syntaxHighlight(json) {
  return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false)\b|-?\d+(\.\d+)?([eE][+-]?\d+)?|\bnull\b)/g, (match) => {
    let cls = 'json-number';
    if (/^"/.test(match)) {
      cls = /:$/.test(match) ? 'json-key' : 'json-string';
    } else if (/true|false/.test(match)) {
      cls = 'json-bool';
    } else if (/null/.test(match)) {
      cls = 'json-null';
    }
    return `<span class="${cls}">${match}</span>`;
  });
}

async function sendRequest() {
  const ep = endpoints[activeIdx];
  const btn = document.getElementById('sendBtn');
  const meta = document.getElementById('responseMeta');
  const body = document.getElementById('responseBody');

  btn.disabled = true;
  btn.textContent = '⏳ Sending…';
  meta.innerHTML = '';
  body.innerHTML = '<div class="placeholder">Loading…</div>';

  const url = BASE + ep.path;
  const opts = { method: ep.method, headers: { 'Content-Type': 'application/json' } };
  if (ep.body) {
    try {
      opts.body = document.getElementById('requestEditor').value;
    } catch (e) {
      opts.body = JSON.stringify(ep.body);
    }
  }

  const t0 = performance.now();
  try {
    const res = await fetch(url, opts);
    const ms = Math.round(performance.now() - t0);
    const text = await res.text();
    let formatted;
    try {
      formatted = JSON.stringify(JSON.parse(text), null, 2);
    } catch {
      formatted = text;
    }
    const ok = res.ok;
    meta.innerHTML = `
      <span class="status-badge ${ok ? 'ok' : 'err'}">${res.status} ${res.statusText}</span>
      <span class="response-time">${ms}ms</span>
    `;
    body.innerHTML = syntaxHighlight(formatted.replace(/&/g,'&amp;').replace(/</g,'&lt;'));
  } catch (err) {
    const ms = Math.round(performance.now() - t0);
    meta.innerHTML = `
      <span class="status-badge err">Error</span>
      <span class="response-time">${ms}ms</span>
    `;
    body.innerHTML = `<span style="color:var(--error)">${err.message}</span>`;
  }

  btn.disabled = false;
  btn.textContent = '▶ Send';
}

function formatJson() {
  const editor = document.getElementById('requestEditor');
  try {
    editor.value = JSON.stringify(JSON.parse(editor.value), null, 2);
  } catch {}
}

// Search
document.getElementById('searchBox').addEventListener('input', (e) => {
  renderEndpoints(e.target.value);
});

// Tab key in editor
document.getElementById('requestEditor').addEventListener('keydown', (e) => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const ta = e.target;
    const s = ta.selectionStart, en = ta.selectionEnd;
    ta.value = ta.value.substring(0, s) + '  ' + ta.value.substring(en);
    ta.selectionStart = ta.selectionEnd = s + 2;
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    sendRequest();
  }
});

// Resizer
const resizer = document.getElementById('resizer');
let isResizing = false;
resizer.addEventListener('mousedown', (e) => {
  isResizing = true;
  resizer.classList.add('dragging');
  document.addEventListener('mousemove', onResize);
  document.addEventListener('mouseup', () => {
    isResizing = false;
    resizer.classList.remove('dragging');
    document.removeEventListener('mousemove', onResize);
  }, { once: true });
});

function onResize(e) {
  if (!isResizing) return;
  const mainBody = document.querySelector('.main-body');
  const panels = mainBody.querySelectorAll('.panel');
  const rect = mainBody.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const pct = (x / rect.width) * 100;
  if (pct > 20 && pct < 80) {
    panels[0].style.flex = `0 0 ${pct}%`;
    panels[1].style.flex = '1';
  }
}

// Init
renderEndpoints();
selectEndpoint(0);
</script>
</body>
</html>
