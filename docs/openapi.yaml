openapi: 3.1.0
info:
  title: Fleet Vector API
  description: >
    Semantic crate intelligence powered by Cloudflare Workers AI and Vectorize.
    Provides vector-based search, similarity, recommendations, gap analysis,
    and dashboard aggregation for the Fleet crate registry.
  version: 1.0.0
  contact:
    name: Casey DiGennaro
    email: casey.digennaro@gmail.com

servers:
  - url: https://fleet-vector-api.casey-digennaro.workers.dev
    description: Production

security: []

paths:
  /search:
    post:
      operationId: search
      summary: Semantic crate search
      description: >
        Embeds the query text with Workers AI, queries the Vectorize index,
        and returns the top-K most semantically similar crates enriched with
        full metadata from KV storage.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:
                  type: string
                  description: Natural-language search query
                topK:
                  type: integer
                  description: Maximum results to return (capped at 50)
                  default: 10
                  minimum: 1
                  maximum: 50
            example:
              query: "HTTP client with middleware support"
              topK: 5
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"
        "400":
          description: Missing or invalid query
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /similar:
    post:
      operationId: similar
      summary: Find similar crates
      description: >
        Given a crate name, retrieves its metadata, embeds it, and queries
        Vectorize for the most similar crates. The source crate is excluded
        from results.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                crate_name:
                  type: string
                  description: Name of the reference crate (alias for name/id)
                name:
                  type: string
                  description: Alias for crate_name
                id:
                  type: string
                  description: Alias for crate_name
                topK:
                  type: integer
                  default: 10
                  minimum: 1
            example:
              crate_name: "axum"
              topK: 5
      responses:
        "200":
          description: Similar crates found
          content:
            application/json:
              schema:
                type: object
                properties:
                  crate:
                    type: string
                    description: The source crate name
                  similar:
                    type: array
                    items:
                      $ref: "#/components/schemas/SimilarResult"
                  count:
                    type: integer
        "400":
          description: No crate identifier provided
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Crate not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /recommend:
    post:
      operationId: recommend
      summary: Context-aware crate recommendations
      description: >
        Accepts a natural-language context string, embeds it, over-fetches
        candidates from Vectorize, then re-ranks using a composite score
        combining semantic similarity with quality signals (tests, LOC,
        description quality). Returns recommendations with reasoning.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context]
              properties:
                context:
                  type: string
                  description: Natural-language description of what you need
                topK:
                  type: integer
                  default: 5
                  minimum: 1
            example:
              context: "I need a fast async runtime for a web server with TLS support"
              topK: 3
      responses:
        "200":
          description: Recommendations with reasoning
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendResponse"
        "400":
          description: Missing context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /gap-analysis:
    post:
      operationId: gapAnalysis
      summary: Identify underdeveloped crates
      description: >
        Analyzes crates for quality gaps — missing descriptions, zero or low
        test counts, and low lines of code. Optionally scoped to a single
        domain. Returns prioritized suggestions and high-quality reference
        crates from other domains.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                domain:
                  type: string
                  description: >
                    Optional domain filter. Omit to analyze all crates.
            example:
              domain: "web"
      responses:
        "200":
          description: Gap analysis results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GapAnalysisResponse"
        "404":
          description: No crates found for the specified domain
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ingest:
    post:
      operationId: ingest
      summary: Ingest crates into the vector index
      description: >
        Accepts one or more crates, generates embeddings via Workers AI,
        upserts vectors into Vectorize, and stores full metadata in KV.
        Requires Bearer token authentication. Maximum 50 crates per request.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/CrateInput"
                - type: object
                  properties:
                    crates:
                      type: array
                      items:
                        $ref: "#/components/schemas/CrateInput"
                      maxItems: 50
                - type: array
                  items:
                    $ref: "#/components/schemas/CrateInput"
                  maxItems: 50
            example:
              crates:
                - name: "my-crate"
                  description: "A fantastic crate"
                  readme: "# My Crate\n\nDoes amazing things."
                  version: "1.0.0"
                  domain: "web"
                  keywords: ["http", "async"]
      responses:
        "200":
          description: Crates ingested successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  inserted:
                    type: integer
                    description: Number of crates inserted
                  vectorize_upsert:
                    type: object
                    description: Raw Vectorize upsert result
                    additionalProperties: true
        "400":
          description: No crates provided or exceeded 50-crate limit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stats:
    get:
      operationId: getStats
      summary: Index statistics
      description: Returns current index metadata including crate count, embedding model, and last ingest timestamp.
      responses:
        "200":
          description: Index statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsResponse"

  /clusters:
    get:
      operationId: getClusters
      summary: Domain clusters with cross-domain similarity
      description: >
        Groups all crates by domain, computes cluster statistics (total tests,
        LOC, top keywords), and calculates inter-cluster similarity based on
        shared keywords.
      responses:
        "200":
          description: Domain clusters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClustersResponse"

  /dashboard:
    get:
      operationId: getDashboard
      summary: Dashboard summary
      description: >
        Aggregated dashboard data: quality breakdown (high/medium/low/stub),
        domain distribution, recently published crates, most similar pairs,
        and per-domain gap analysis summary.
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardResponse"

  /crates/{name}:
    get:
      operationId: getCrate
      summary: Get crate metadata
      description: Retrieves full metadata for a single crate by name from KV storage.
      parameters:
        - name: name
          in: path
          required: true
          description: Crate name
          schema:
            type: string
      responses:
        "200":
          description: Crate metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrateMetadata"
        "404":
          description: Crate not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Bearer token matching the INGEST_SECRET environment variable.

  schemas:
    CrateInput:
      type: object
      required: [name, description, readme]
      properties:
        name:
          type: string
          description: Crate name (used as the vector ID)
        description:
          type: string
          description: Short description of the crate
        readme:
          type: string
          description: Full README text (truncated to 1500 chars for embedding)
        version:
          type: string
          default: "0.1.0"
        domain:
          type: string
          default: unknown
          description: Category domain (e.g. web, cli, crypto)
        wave:
          type: integer
          default: 0
        tests:
          type: integer
          default: 0
          description: Number of tests
        loc:
          type: integer
          default: 0
          description: Lines of code
        github_url:
          type: string
          default: ""
        keywords:
          type: array
          items:
            type: string
          default: []

    CrateMetadata:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        version:
          type: string
        domain:
          type: string
        wave:
          type: integer
        tests:
          type: integer
        loc:
          type: integer
        github_url:
          type: string
        keywords:
          type: array
          items:
            type: string
        embedded_at:
          type: integer
          description: Unix timestamp (ms) when the crate was embedded
        model:
          type: string
          description: Embedding model used
        dims:
          type: integer
          description: Embedding vector dimensions

    SearchResult:
      type: object
      description: A single search result enriched with full metadata
      properties:
        id:
          type: string
          description: Crate name (vector ID)
        score:
          type: number
          description: Cosine similarity score from Vectorize
        name:
          type: string
        description:
          type: string
        version:
          type: string
        domain:
          type: string
        wave:
          type: integer
        tests:
          type: integer
        loc:
          type: integer
        github_url:
          type: string
        keywords:
          type: array
          items:
            type: string
        embedded_at:
          type: integer
        model:
          type: string
        dims:
          type: integer

    SearchResponse:
      type: object
      properties:
        query:
          type: string
        model:
          type: string
          description: Embedding model used for the query
        results:
          type: array
          items:
            $ref: "#/components/schemas/SearchResult"
        count:
          type: integer

    SimilarResult:
      type: object
      properties:
        id:
          type: string
        score:
          type: number
        metadata:
          type: object
          additionalProperties: true

    RecommendResult:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        domain:
          type: string
        version:
          type: string
        semantic_score:
          type: number
          description: Raw cosine similarity from Vectorize
        composite_score:
          type: number
          description: Weighted score combining semantic + quality signals
        quality_signals:
          type: object
          properties:
            tests:
              type: integer
            loc:
              type: integer
            has_description:
              type: boolean
        reasoning:
          type: array
          items:
            type: string
          description: Human-readable explanations for the recommendation

    RecommendResponse:
      type: object
      properties:
        context:
          type: string
        recommendations:
          type: array
          items:
            $ref: "#/components/schemas/RecommendResult"
        count:
          type: integer

    GapSuggestion:
      type: object
      properties:
        name:
          type: string
        domain:
          type: string
        issues:
          type: array
          items:
            type: string
            enum:
              - missing_description
              - no_tests
              - low_test_count
              - zero_loc
              - low_loc
        severity:
          type: integer
          description: Number of distinct issues
        tests:
          type: integer
        loc:
          type: integer
        description:
          type: string
        priority:
          type: string
          enum: [critical, high, medium]
        suggestion:
          type: array
          items:
            type: string

    GapReference:
      type: object
      properties:
        name:
          type: string
        domain:
          type: string
        tests:
          type: integer
        loc:
          type: integer
        reason:
          type: string

    GapAnalysisResponse:
      type: object
      properties:
        domain:
          type: string
        total_crates:
          type: integer
        quality_crates:
          type: integer
        gap_crates:
          type: integer
        gap_percentage:
          type: integer
        suggestions:
          type: array
          items:
            $ref: "#/components/schemas/GapSuggestion"
        references:
          type: array
          items:
            $ref: "#/components/schemas/GapReference"

    StatsResponse:
      type: object
      properties:
        service:
          type: string
        model:
          type: string
        dimensions:
          type: integer
        crate_count:
          type: integer
        last_ingest:
          type: string
          description: ISO 8601 timestamp or "never"
        backend:
          type: string
        index:
          type: string

    ClusterSummary:
      type: object
      properties:
        domain:
          type: string
        crate_count:
          type: integer
        crates:
          type: array
          items:
            type: string
        total_tests:
          type: integer
        total_loc:
          type: integer
        avg_tests_per_crate:
          type: integer
        top_keywords:
          type: array
          items:
            type: string

    InterClusterRef:
      type: object
      properties:
        domains:
          type: array
          items:
            type: string
          minItems: 2
          maxItems: 2
        shared_keywords:
          type: array
          items:
            type: string
        similarity:
          type: number

    ClustersResponse:
      type: object
      properties:
        clusters:
          type: array
          items:
            $ref: "#/components/schemas/ClusterSummary"
        inter_cluster:
          type: array
          items:
            $ref: "#/components/schemas/InterClusterRef"
        total_domains:
          type: integer
        total_crates:
          type: integer

    DashboardResponse:
      type: object
      properties:
        total_crates:
          type: integer
        quality_breakdown:
          type: object
          properties:
            high:
              type: integer
            medium:
              type: integer
            low:
              type: integer
            stub:
              type: integer
        domain_distribution:
          type: object
          additionalProperties:
            type: integer
        recently_published:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              domain:
                type: string
              version:
                type: string
        most_similar_pairs:
          type: array
          items:
            type: object
            properties:
              crate_a:
                type: string
              crate_b:
                type: string
              score:
                type: number
        gap_analysis:
          type: object
          additionalProperties:
            type: object
            properties:
              total:
                type: integer
              gaps:
                type: integer
        generated_at:
          type: string
          description: ISO 8601 timestamp

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Human-readable error message
      required: [error]
