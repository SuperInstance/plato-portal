name: Generate Repo Index

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:  # manual trigger
  push:
    branches: [main]
    paths: ['scripts/generate-index.sh']

permissions:
  contents: write

jobs:
  generate-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install GitHub CLI
        run: |
          type gh || (sudo apt-get update && sudo apt-get install -y gh)
      
      - name: Authenticate
        run: echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token
      
      - name: Generate Index
        run: bash scripts/generate-index.sh INDEX.md
      
      - name: Commit and Push
        run: |
          git config user.name "Index Bot"
          git config user.email "index-bot@superinstance.ai"
          git add INDEX.md
          git diff --cached --quiet || git commit -m "Auto-generate repo index ($(date -u '+%Y-%m-%d'))"
          git push
