name: Cross-Reference Audit

on:
  schedule:
    - cron: '0 8 * * 1'  # weekly Monday
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install GitHub CLI
        run: |
          type gh || (sudo apt-get update && sudo apt-get install -y gh)
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token
      
      - name: Generate Cross-Reference Audit
        run: |
          chmod +x scripts/audit-cross-refs.sh
          bash scripts/audit-cross-refs.sh CROSS-REFERENCES.md
      
      - name: Commit Audit
        run: |
          git config user.name "Audit Bot"
          git config user.email "audit-bot@superinstance.ai"
          git add CROSS-REFERENCES.md
          git diff --cached --quiet || git commit -m "Cross-reference audit ($(date -u '+%Y-%m-%d'))"
          git push
